<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIJAK DIGITAL - Modul Pembelajaran</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <div id="root" class="flex flex-col min-h-screen"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script type="text/babel">
        // --- CONFIGURATION AREA ---
        // Gantikan dengan konfigurasi Firebase Project anda sendiri
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Konfigurasi Pautan Google Drive
        const GOOGLE_DRIVE_URL = "https://drive.google.com/file/d/1Roq-V_IHlCSmb1NpBl1NimV25nkzZDM_/view?usp=drive_link";
        // --------------------------

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function App() {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setUser(user);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = async () => {
                try {
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    console.error("Ralat Log Masuk:", error);
                    alert("Gagal log masuk. Sila cuba lagi.");
                }
            };

            const handleLogout = () => {
                auth.signOut().catch((error) => console.error("Ralat Log Keluar:", error));
            };

            if (loading) {
                return (
                    <div class="flex flex-1 items-center justify-center bg-slate-50">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                );
            }

            return (
                <div class="flex flex-col min-h-screen justify-between">
                    {/* HEADER */}
                    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                                    BIJAK DIGITAL
                                </span>
                            </div>
                            {user && (
                                <div class="flex items-center space-x-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    <span class="text-xs font-medium text-slate-600 hidden sm:inline">Log Masuk Aktif</span>
                                </div>
                            )}
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main class="flex-1 flex items-center justify-center p-4 max-w-5xl w-full mx-auto">
                        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 sm:p-10 max-w-md w-full text-center transform transition-all duration-300">
                            
                            {!user ? (
                                /* Paparan Sebelum Log Masuk */
                                <div class="space-y-6">
                                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto text-3xl font-bold shadow-inner">
                                        BD
                                    </div>
                                    <div class="space-y-2">
                                        <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">
                                            Selamat Datang
                                        </h1>
                                        <p class="text-slate-500 text-sm sm:text-base">
                                            Sila log masuk menggunakan akaun Google anda untuk mengakses modul pembelajaran digital.
                                        </p>
                                    </div>
                                    <hr class="border-slate-100" />
                                    <button 
                                        onClick={handleLogin}
                                        class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-700 font-semibold py-3 px-4 border border-slate-300 rounded-xl shadow-sm transition duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                                    >
                                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                        </svg>
                                        <span>Log Masuk dengan Google</span>
                                    </button>
                                </div>
                            ) : (
                                /* Paparan Selepas Log Masuk (Dashboard) */
                                <div class="space-y-6">
                                    <div class="flex flex-col items-center space-y-3">
                                        <div class="relative">
                                            <img 
                                                src={user.photoURL || "https://via.placeholder.com/150"} 
                                                alt="Profil Pengguna" 
                                                class="w-20 h-20 rounded-full border-4 border-blue-100 object-cover shadow-sm"
                                            />
                                            <span class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></span>
                                        </div>
                                        <div>
                                            <h2 class="text-sm font-medium text-slate-400 uppercase tracking-wider">Selamat Datang</h2>
                                            <h1 class="text-xl font-bold text-slate-800">{user.displayName}</h1>
                                            <p class="text-xs text-slate-500">{user.email}</p>
                                        </div>
                                    </div>

                                    <hr class="border-slate-100" />

                                    {/* Utama: Butang Akses Modul */}
                                    <div class="py-2">
                                        <a 
                                            href={GOOGLE_DRIVE_URL}
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            class="w-full inline-flex items-center justify-center gap-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 transform hover:-translate-y-0.5 text-lg cursor-pointer"
                                        >
                                            <span>📁 Buka Modul Pembelajaran</span>
                                        </a>
                                        <p class="text-xs text-slate-400 mt-2">
                                            Modul akan dibuka di tab baharu melalui Google Drive
                                        </p>
                                    </div>

                                    <hr class="border-slate-100" />

                                    {/* Butang Log Keluar */}
                                    <button 
                                        onClick={handleLogout}
                                        class="w-full flex items-center justify-center gap-2 bg-slate-50 hover:bg-red-50 text-slate-500 hover:text-red-600 font-medium py-2.5 px-4 rounded-lg border border-slate-200 hover:border-red-200 transition duration-150 text-sm cursor-pointer"
                                    >
                                        <span>🚪 Log Keluar</span>
                                    </button>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400">
                        <div class="max-w-5xl mx-auto px-4">
                            &copy; {new Date().getFullYear()} BIJAK DIGITAL. Hak Cipta Terpelihara.
                        </div>
                    </footer>
                </div>
            );
        }

        const root = tragedies = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
